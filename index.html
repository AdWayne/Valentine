<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <title>Валентинка</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
 <style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe6eb, #ffffff);
    font-family: 'Arial', sans-serif;
    margin: 0;
    flex-direction: column;
    text-align: center;
    padding: 20px;
  }

  #heart {
    color: #ff4d6d;
    font-size: 300px;
    animation: heartbeat 1s infinite alternate;
    line-height: 1;
  }

  @keyframes heartbeat {
    0% { transform: scale(1); }
    100% { transform: scale(1.15); }
  }

  #message {
    font-size: 28px;
    margin-top: 10px;
    font-weight: 600;
    color: #333;
  }

  #proposal {
    font-size: 22px;
    margin-top: 5px;
    color: #555;
  }

  #buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .button {
    padding: 12px 28px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 25px;
    transition: all 0.3s ease;
    min-width: 120px;
  }

  .button-yes {
    background-color: #4CAF50;
    color: white;
  }

  .button-yes:hover {
    background-color: #43a047;
    transform: scale(1.05);
  }

  .button-no {
    background-color: #f44336;
    color: white;
  }

  .button-no:hover {
    background-color: #e53935;
    transform: scale(1.05);
  }

  .happy-gif {
    max-width: 350px;
    width: 100%;
    display: none;
    margin-top: 20px;
  }

  .yay-message {
    font-size: 26px;
    font-weight: bold;
    color: #ff4d6d;
    margin-top: 15px;
    display: none;
  }

  @media (max-width: 768px) {
    #heart {
      font-size: 200px;
    }

    #message {
      font-size: 22px;
    }

    #proposal {
      font-size: 18px;
    }

    .button {
      font-size: 16px;
      padding: 10px 22px;
    }

    .happy-gif {
      max-width: 250px;
    }

    .yay-message {
      font-size: 20px;
    }
  }

  @media (max-width: 480px) {
    #heart {
      font-size: 150px;
    }

    #message {
      font-size: 20px;
    }

    #proposal {
      font-size: 16px;
    }

    #buttons {
      gap: 12px;
    }

    .button {
      font-size: 14px;
      padding: 8px 18px;
      min-width: 100px;
    }

    .happy-gif {
      max-width: 200px;
    }

    .yay-message {
      font-size: 18px;
    }
  }
</style>
</head>
<body>

  <div id="heart">
    <p>♥</p>
  </div>

  <div id="message">
    <p>С Днём Святого Валентина!</p>
  </div>

  <div id="proposal">
    <p>Будешь моей девушкой?</p>
  </div>

  <div id="buttons">
    <button class="button button-yes" onclick="showHappyGif()">Да</button>
    <button class="button button-no" onclick="hideNoButton()">Нет</button>
  </div>
  
  <img class="happy-gif" src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Happy GIF">
  <div class="yay-message">YaY!</div>

  <script>
    function showHappyGif() {
      document.getElementById('heart').style.display = 'none';
      document.getElementById('message').style.display = 'none';
      document.getElementById('proposal').style.display = 'none';
      document.getElementById('buttons').style.display = 'none';
      document.querySelector('.happy-gif').style.display = 'block';
      document.querySelector('.happy-gif').style.visibility = 'visible';
      document.querySelector('.yay-message').style.display = 'block';
    }

    function hideNoButton() {
      document.querySelector('.button-no').style.display = 'none';
      
    }
  </script>
</body>
</html>
